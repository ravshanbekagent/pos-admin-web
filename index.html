<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>admin-desktop</title>
    <script>
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = '#fff';
        div.style.color = '#f00';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.style.fontFamily = 'monospace';
        div.innerHTML = '<h1>Javascript Error Detected:</h1><pre>' + e.message + '\n' + e.filename + ':' + e.lineno + ':' + e.colno + '\n\n' + (e.error ? e.error.stack : '') + '</pre>';
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = '#fff';
        div.style.color = '#f00';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.style.fontFamily = 'monospace';
        div.innerHTML = '<h1>Unhandled Promise Rejection:</h1><pre>' + e.reason + '\n\n' + (e.reason ? e.reason.stack : '') + '</pre>';
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
